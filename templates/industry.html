{% extends "base.html" %}
{% block title %}行业分析 - A股分析平台{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h4 class="mb-3">🏭 板块行业分析</h4>
    </div>
</div>

<div class="row">
    <div class="col-lg-8 mb-3">
        <div class="card">
            <div class="card-header">📊 板块涨跌幅排行</div>
            <div class="card-body"><div id="chartSectorBar" class="chart-container" style="height:400px;"></div></div>
        </div>
    </div>
    <div class="col-lg-4 mb-3">
        <div class="card">
            <div class="card-header">🔵 板块市值占比</div>
            <div class="card-body"><div id="chartSectorPie" class="chart-container" style="height:400px;"></div></div>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-12">
        <div class="card">
            <div class="card-header">🏆 各板块龙头股</div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover" id="leaderTable">
                        <thead><tr>
                            <th>板块</th>
                            <th>股票数</th>
                            <th>平均涨跌幅</th>
                            <th>上涨/下跌</th>
                            <th>龙头股（市值 TOP3）</th>
                            <th style="width:180px;">涨幅 TOP3</th>
                        </tr></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function loadSectors() {
    fetch('/api/sectors')
        .then(r => r.json())
        .then(res => {
            if (!res.success) return;
            const data = res.data;

            // 涨跌幅柱状图
            const barEl = document.getElementById('chartSectorBar');
            const barChart = echarts.init(barEl);
            barChart.setOption({
                tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                grid: { left: '15%', right: '5%', top: 30, bottom: 40 },
                xAxis: { type: 'category', data: data.map(d => d.sector), axisLabel: { fontSize: 11, interval: 0 } },
                yAxis: { type: 'value', name: '平均涨跌幅(%)' },
                series: [{
                    type: 'bar',
                    data: data.map(d => ({
                        value: d.avg_change_pct,
                        itemStyle: { color: d.avg_change_pct >= 0 ? '#e74c3c' : '#27ae60' }
                    })),
                    label: { show: true, position: 'top', formatter: '{c}%' },
                }]
            });
            window.addEventListener('resize', () => barChart.resize());

            // 市值占比饼图
            const pieEl = document.getElementById('chartSectorPie');
            const pieChart = echarts.init(pieEl);
            pieChart.setOption({
                tooltip: { trigger: 'item', formatter: '{b}: {c}万元 ({d}%)' },
                series: [{
                    type: 'pie',
                    radius: ['25%', '55%'],
                    avoidLabelOverlap: true,
                    data: data.map(d => ({ name: d.sector, value: d.total_market_cap })),
                    label: { formatter: '{b}\n{d}%', fontSize: 11 },
                }]
            });
            window.addEventListener('resize', () => pieChart.resize());

            // 表格
            const tbody = document.querySelector('#leaderTable tbody');
            tbody.innerHTML = data.map(d => {
                const leaders = d.leaders.map(l =>
                    `<div style="margin-bottom:4px;"><a href="/stock/${l.code}" class="text-decoration-none fw-medium">${l.name}</a> <span class="text-muted small">${l.code}</span><br><span class="small text-muted">市值 ${(l.market_cap / 10000).toFixed(1)}亿</span></div>`
                ).join('');
                const gainers = d.top_gainers.map(g =>
                    `<div style="margin-bottom:4px;"><a href="/stock/${g.code}" class="text-decoration-none">${g.name}</a> <span class="text-muted small">${g.code}</span><br><span class="${g.change_pct >= 0 ? 'up' : 'down'} fw-bold">${g.change_pct >= 0 ? '+' : ''}${g.change_pct}%</span></div>`
                ).join('');
                const avgClass = d.avg_change_pct >= 0 ? 'up' : 'down';
                return `<tr>
                    <td><strong>${d.sector}</strong></td>
                    <td>${d.count}</td>
                    <td class="${avgClass} fw-bold">${d.avg_change_pct >= 0 ? '+' : ''}${d.avg_change_pct}%</td>
                    <td><span class="up fw-bold">${d.up_count}</span> / <span class="down fw-bold">${d.down_count}</span></td>
                    <td style="line-height:1.6;">${leaders}</td>
                    <td style="line-height:1.6;">${gainers}</td>
                </tr>`;
            }).join('');
        });
}

loadSectors();
</script>
{% endblock %}
