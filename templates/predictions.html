{% extends "base.html" %}
{% block title %}预测记录 - A股分析平台{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h4 class="mb-3">预测历史记录</h4>
    </div>
</div>

<!-- 时间线说明 -->
<div class="row mb-2">
    <div class="col-12">
        <small class="text-muted">
            时间线：分析日对数据进行分析预测 → 目标日收盘后验证结果
        </small>
    </div>
</div>

<!-- Date selector -->
<div class="row mb-3">
    <div class="col-md-4">
        <div class="card">
            <div class="card-body d-flex align-items-center">
                <label class="me-2 text-muted" style="white-space:nowrap;">选择日期:</label>
                <select id="dateSelect" class="form-select form-select-sm" onchange="switchDate(this.value)">
                    <option value="">加载中...</option>
                </select>
            </div>
        </div>
    </div>
</div>

<!-- Summary cards -->
<div class="row" id="summaryCards">
    <div class="col-md-2 col-6 mb-3">
        <div class="card stat-card">
            <div class="label">分析日</div>
            <div class="number" id="predictDate" style="font-size:1.0rem;">--</div>
            <small class="text-muted">生成预测</small>
        </div>
    </div>
    <div class="col-md-2 col-6 mb-3">
        <div class="card stat-card">
            <div class="label">目标日</div>
            <div class="number" id="targetDate" style="font-size:1.0rem;">--</div>
            <small class="text-muted">预测交易日</small>
        </div>
    </div>
    <div class="col-md-2 col-6 mb-3">
        <div class="card stat-card">
            <div class="label">预测总数</div>
            <div class="number" id="totalCount">--</div>
        </div>
    </div>
    <div class="col-md-2 col-6 mb-3">
        <div class="card stat-card">
            <div class="label">方向正确</div>
            <div class="number" id="correctCount">--</div>
        </div>
    </div>
    <div class="col-md-2 col-6 mb-3">
        <div class="card stat-card">
            <div class="label">准确率</div>
            <div class="number" id="accuracyPct">--</div>
        </div>
    </div>
    <div class="col-md-2 col-6 mb-3">
        <div class="card stat-card">
            <div class="label">涨/跌预测</div>
            <div class="number" id="upDownCount" style="font-size:1.2rem;">--</div>
        </div>
    </div>
</div>

<!-- Detail table -->
<div class="row">
    <div class="col-12 mb-3">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span>逐只股票预测对比</span>
                <small class="text-muted">共 <span id="detailTotal">0</span> 只</small>
            </div>
            <div class="card-body p-0">
                <div id="predictionTable">
                    <div class="text-center text-muted py-3">选择日期查看明细</div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
var allDates = [];

function loadDates() {
    fetch('/api/predict/records')
        .then(function(r) { return r.json(); })
        .then(function(res) {
            if (!res.success) {
                document.getElementById('dateSelect').innerHTML = '<option>加载失败</option>';
                return;
            }
            var data = res.data;
            allDates = data.dates || [];
            var sel = document.getElementById('dateSelect');
            sel.innerHTML = '';
            if (allDates.length === 0) {
                sel.innerHTML = '<option>暂无数据</option>';
                // 显示收集信息状态
                fetch('/api/predict/next')
                    .then(function(r) { return r.json(); })
                    .then(function(nr) {
                        if (!nr.success) return;
                        var nd = nr.data;
                        if (nd.status === 'scheduled' && nd.next_pred_time) {
                            var t = nd.next_pred_time.substring(0, 16).replace('T', ' ');
                            document.getElementById('summaryCards').innerHTML =
                                '<div class="col-12"><div class="card"><div class="card-body text-center py-4">' +
                                '<div class="mb-2" style="font-size:1.2rem;color:#888;">📡 收集中</div>' +
                                '<div class="text-muted">正在收集市场信息，预计 <strong>' + t + '</strong> 给出预测数据</div>' +
                                '<div class="mt-2"><small class="text-muted">下一交易日：' + (nd.next_trading_day || '--') + '</small></div>' +
                                '</div></div></div>';
                            document.getElementById('predictionTable').innerHTML = '';
                        }
                    });
                return;
            }
            allDates.forEach(function(d) {
                var opt = document.createElement('option');
                opt.value = d.date;
                var label = d.date + '  (正确' + d.correct + '/' + d.total + '  ' + d.accuracy.toFixed(1) + '%)';
                opt.textContent = label;
                sel.appendChild(opt);
            });
            // Load first date
            switchDate(allDates[0].date);
        })
        .catch(function() {
            document.getElementById('dateSelect').innerHTML = '<option>加载失败</option>';
        });
}

function switchDate(date) {
    if (!date) return;
    fetch('/api/predict/records?date=' + date)
        .then(function(r) { return r.json(); })
        .then(function(res) {
            if (!res.success) return;
            var data = res.data;
            renderSummary(data);
            renderTable(data.details || []);
        })
        .catch(function() {});
}

function renderSummary(data) {
    document.getElementById('totalCount').textContent = data.total || 0;
    document.getElementById('correctCount').textContent = data.correct || 0;
    document.getElementById('predictDate').textContent = data.predict_date_min || '--';
    document.getElementById('targetDate').textContent = data.selected_date || '--';

    var acc = data.accuracy_pct || 0;
    var accEl = document.getElementById('accuracyPct');
    accEl.textContent = acc.toFixed(1) + '%';
    accEl.style.color = acc >= 70 ? '#e74c3c' : acc >= 50 ? '#f39c12' : '#27ae60';

    // Up/down count
    var up = 0, down = 0;
    (data.details || []).forEach(function(d) {
        if (d.pred_direction === '看涨') up++;
        else if (d.pred_direction === '看跌') down++;
    });
    document.getElementById('upDownCount').innerHTML =
        '<span class="up">看涨' + up + '</span> / <span class="down">看跌' + down + '</span>';
    document.getElementById('detailTotal').textContent = data.total || 0;
}

function renderTable(details) {
    var container = document.getElementById('predictionTable');
    if (!details.length) {
        container.innerHTML = '<div class="text-center text-muted py-3">该日暂无明细数据</div>';
        return;
    }

    var html = '<div class="table-responsive"><table class="table table-hover mb-0">' +
        '<thead class="table-light"><tr>' +
        '<th>#</th><th>代码</th><th>名称</th>' +
        '<th class="text-end">收盘价</th>' +
        '<th class="text-end">预估涨幅</th>' +
        '<th class="text-end">目标价</th>' +
        '<th class="text-end">实际涨跌幅</th>' +
        '<th class="text-end">实际价</th>' +
        '<th>方向</th>' +
        '<th class="text-end" style="font-size:0.85em;">分析日</th>' +
        '</tr></thead><tbody>';

    details.forEach(function(item, i) {
        var ok = item.direction_correct;
        var rowCls = ok === true ? 'table-success' : ok === false ? 'table-danger' : '';

        var badgeHtml = ok === true
            ? '<span class="badge bg-success">正确</span>'
            : ok === false
                ? '<span class="badge bg-danger">错误</span>'
                : '<span class="badge bg-secondary">未知</span>';

        var predCls = (item.pred_change_pct || 0) >= 0 ? 'up' : 'down';
        var actCls = item.change_pct >= 0 ? 'badge-up' : 'badge-down';

        var predStr = item.pred_change_pct !== null
            ? (item.pred_change_pct >= 0 ? '+' : '') + item.pred_change_pct.toFixed(2) + '%'
            : '--';
        var actStr = (item.change_pct >= 0 ? '+' : '') + item.change_pct.toFixed(2) + '%';

        html += '<tr class="' + rowCls + '">' +
            '<td>' + (i + 1) + '</td>' +
            '<td><a href="/stock/' + item.code + '" class="text-decoration-none fw-medium">' + item.code + '</a></td>' +
            '<td>' + item.name + '</td>' +
            '<td class="text-end">' + (item.last_price ? item.last_price.toFixed(2) : '--') + '</td>' +
            '<td class="text-end ' + predCls + '">' + predStr + '</td>' +
            '<td class="text-end">' + (item.predicted_price ? item.predicted_price.toFixed(2) : '--') + '</td>' +
            '<td class="text-end"><span class="' + actCls + '">' + actStr + '</span></td>' +
            '<td class="text-end">' + (item.actual_price ? item.actual_price.toFixed(2) : '--') + '</td>' +
            '<td>' + badgeHtml + '<br><small class="text-muted">' +
            (item.pred_direction || '') + '→' + (item.actual_direction || '') + '</small></td>' +
            '<td class="text-end" style="font-size:0.85em;color:#999;">' + (item.predict_date || '--') + '</td>' +
            '</tr>';
    });

    html += '</tbody></table></div>';
    container.innerHTML = html;
}

loadDates();
</script>
{% endblock %}
