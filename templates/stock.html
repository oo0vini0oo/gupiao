{% extends "base.html" %}
{% block title %}{{ code }} - 个股详情{% endblock %}

{% block content %}
<div class="row mb-3">
    <div class="col-12">
        <div class="card">
            <div class="card-body py-3" id="stockInfo">
                <p class="mb-0">加载中...</p>
            </div>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-md-8 mb-3">
        <div class="card">
            <div class="card-header">📊 历史走势（MA5 / MA10 / MA20）</div>
            <div class="card-body"><div id="chartTrend" class="chart-container" style="height:450px;"></div></div>
        </div>
    </div>
    <div class="col-md-4 mb-3">
        <div class="card">
            <div class="card-header">🔮 下个交易日预测</div>
            <div class="card-body" id="predictInfo">
                <p class="text-muted mb-0">加载中...</p>
            </div>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-12 mb-3">
        <div class="card">
            <div class="card-header">📊 成交量</div>
            <div class="card-body"><div id="chartVolume" class="chart-container" style="height:280px;"></div></div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const code = '{{ code }}';

function loadStockDetail() {
    fetch(`/api/stock/${code}/history`)
        .then(r => r.json())
        .then(res => {
            if (!res.success || !res.data.length) {
                document.getElementById('stockInfo').innerHTML = '<p class="text-danger">暂无数据</p>';
                return;
            }
            const data = res.data;
            const latest = data[data.length - 1];

            // 顶部状态栏
            const chgCls = latest.change_pct >= 0 ? 'up' : 'down';
            const chgIcon = latest.change_pct >= 0 ? '↑' : '↓';
            document.getElementById('stockInfo').innerHTML = `
                <div class="row text-center align-items-center g-2">
                    <div class="col">
                        <div class="text-muted small">代码</div>
                        <div class="fw-bold">${latest.code || code}</div>
                    </div>
                    <div class="col">
                        <div class="text-muted small">名称</div>
                        <div class="fw-bold">${latest.name || '--'}</div>
                    </div>
                    <div class="col">
                        <div class="text-muted small">最新价</div>
                        <div class="fw-bold fs-5">${latest.price || '--'}</div>
                    </div>
                    <div class="col">
                        <div class="text-muted small">涨跌幅</div>
                        <div class="fw-bold fs-5 ${chgCls}">${latest.change_pct ? chgIcon + latest.change_pct.toFixed(2) + '%' : '--'}</div>
                    </div>
                    <div class="col">
                        <div class="text-muted small">最高</div>
                        <div class="fw-bold">${latest.high || '--'}</div>
                    </div>
                    <div class="col">
                        <div class="text-muted small">最低</div>
                        <div class="fw-bold">${latest.low || '--'}</div>
                    </div>
                    <div class="col">
                        <div class="text-muted small">成交量</div>
                        <div class="fw-bold">${latest.volume ? (latest.volume / 10000).toFixed(0) + '万手' : '--'}</div>
                    </div>
                </div>
            `;

            // 价格趋势图（含 MA5, MA10, MA20）
            const dates = data.map(d => d.date);
            const prices = data.map(d => d.price);

            function calcMA(data, n) {
                const result = [];
                for (let i = 0; i < data.length; i++) {
                    if (i < n - 1) { result.push(null); continue; }
                    let sum = 0;
                    for (let j = i - n + 1; j <= i; j++) sum += data[j];
                    result.push(+(sum / n).toFixed(2));
                }
                return result;
            }

            const ma5 = calcMA(prices, 5);
            const ma10 = calcMA(prices, 10);
            const ma20 = calcMA(prices, 20);

            const trendEl = document.getElementById('chartTrend');
            const trendChart = echarts.init(trendEl);
            trendChart.setOption({
                tooltip: { trigger: 'axis', axisPointer: { type: 'cross' } },
                legend: { data: ['收盘价', 'MA5', 'MA10', 'MA20'], top: 0 },
                grid: { left: '8%', right: '5%', top: 40, bottom: 40 },
                xAxis: { type: 'category', data: dates, axisLabel: { rotate: 30, fontSize: 10, margin: 8 } },
                yAxis: { type: 'value', scale: true },
                series: [
                    { name: '收盘价', type: 'line', data: prices, smooth: true, lineStyle: { width: 2 }, areaStyle: { opacity: 0.1 } },
                    { name: 'MA5', type: 'line', data: ma5, smooth: true, lineStyle: { width: 1, type: 'dashed' }, symbol: 'none' },
                    { name: 'MA10', type: 'line', data: ma10, smooth: true, lineStyle: { width: 1, type: 'dashed' }, symbol: 'none' },
                    { name: 'MA20', type: 'line', data: ma20, smooth: true, lineStyle: { width: 1, type: 'dashed' }, symbol: 'none' },
                ]
            });
            window.addEventListener('resize', () => trendChart.resize());

            // 成交量图
            const volEl = document.getElementById('chartVolume');
            const volChart = echarts.init(volEl);
            volChart.setOption({
                tooltip: { trigger: 'axis' },
                grid: { left: '8%', right: '5%', top: 20, bottom: 40 },
                xAxis: { type: 'category', data: dates, axisLabel: { show: false } },
                yAxis: { type: 'value', name: '成交量(手)' },
                series: [{
                    type: 'bar',
                    data: data.map(d => ({
                        value: d.volume || 0,
                        itemStyle: { color: d.change_pct >= 0 ? '#e74c3c' : '#27ae60' }
                    })),
                }]
            });
            window.addEventListener('resize', () => volChart.resize());
        });

    // 预测数据
    fetch(`/api/stock/${code}/predict`)
        .then(r => r.json())
        .then(res => {
            const el = document.getElementById('predictInfo');
            if (!res.success) {
                el.innerHTML = '<p class="text-danger mb-0">预测接口异常</p>';
                return;
            }
            const d = res.data;
            if (d.error || !d.predictions || !d.predictions.length) {
                el.innerHTML = '<p class="text-muted mb-0">暂无预测数据</p>';
                return;
            }
            const pred = d.predictions[0];
            const trendIcon = d.trend === 'up' ? '📈' : '📉';
            const trendColor = d.trend === 'up' ? 'up' : 'down';
            const trendLabel = d.trend === 'up' ? '看涨' : '看跌';
            el.innerHTML = `
                <div class="text-center mb-3">
                    <span class="badge fs-6 ${d.trend === 'up' ? 'bg-danger' : 'bg-success'}" style="padding:6px 18px;border-radius:20px;">
                        ${trendIcon} ${trendLabel}
                    </span>
                </div>
                <div class="text-center mb-2">
                    <small class="text-muted">目标日期</small>
                    <div class="fw-bold">${pred.date}</div>
                </div>
                <div class="row text-center mb-2">
                    <div class="col-6">
                        <small class="text-muted">预测价格</small>
                        <div class="fw-bold fs-5">${pred.predicted_price.toFixed(2)}</div>
                    </div>
                    <div class="col-6">
                        <small class="text-muted">预估涨幅</small>
                        <div class="fw-bold fs-5 ${trendColor}">${d.change_pct >= 0 ? '+' : ''}${d.change_pct}%</div>
                    </div>
                </div>
                <div class="mb-2"><small class="text-muted">模型: ${d.model_version || 'v2'} · 多项式+加权平均</small></div>
                ${d.reason ? `<div class="small text-muted border-top pt-2 mt-2">${d.reason}</div>` : ''}
            `;
        });
}

loadStockDetail();
</script>
{% endblock %}
