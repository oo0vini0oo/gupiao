<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}A股分析平台{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5;font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Microsoft YaHei",sans-serif; }
        .navbar-brand { font-weight: 700; font-size: 1.3rem; }
        .card { border-radius: 12px; border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 20px; transition: box-shadow .2s; }
        .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
        .card-header { background: #fff; border-bottom: 1px solid #f0f0f0; font-weight: 600; padding: 15px 20px; border-radius: 12px 12px 0 0 !important; }
        .card-body { padding: 20px; }
        .chart-container { width: 100%; height: 400px; }
        .stat-card { text-align: center; padding: 20px; }
        .stat-card .number { font-size: 2rem; font-weight: 700; }
        .stat-card .label { color: #888; font-size: 0.9rem; }
        /* A股颜色：红涨绿跌 */
        .up { color: #e74c3c; }
        .down { color: #27ae60; }
        .bg-up { background: #e74c3c; color: #fff; }
        .bg-down { background: #27ae60; color: #fff; }
        .badge-up { background: #fde8e8; color: #e74c3c; font-weight: 600; padding: 2px 8px; border-radius: 4px; }
        .badge-down { background: #e8f8ee; color: #27ae60; font-weight: 600; padding: 2px 8px; border-radius: 4px; }
        .badge-sz { background: #e3f2fd; color: #1565c0; }
        .badge-sh { background: #fff3e0; color: #e65100; }
        .badge-cy { background: #f3e5f5; color: #7b1fa2; }
        .badge-kc { background: #e0f2f1; color: #00695c; }
        .badge-bj { background: #fce4ec; color: #c62828; }
        /* 表格增强 */
        .table th { border-top: none; font-size: 0.85rem; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
        .table td { vertical-align: middle; font-size: 0.9rem; }
        .table-hover tbody tr:hover { background: #f8f9ff; }
        .predict-bar { height: 4px; border-radius: 2px; margin-top: 4px; background: #eee; overflow: hidden; }
        .predict-bar-fill { height: 100%; border-radius: 2px; transition: width .5s; }
        /* 理由标签 */
        .reason-tag { display: inline-block; font-size: 0.78rem; padding: 2px 8px; border-radius: 10px; margin: 1px 2px; background: #f0f0f0; color: #555; }
        .reason-tag.strong { background: #fde8e8; color: #e74c3c; }
        .reason-tag.volume { background: #fff3e0; color: #e65100; }
        .reason-tag.sector { background: #e3f2fd; color: #1565c0; }
        .reason-tag.pe { background: #e8f5e9; color: #2e7d32; }
        .reason-tag.model { background: #f3e5f5; color: #7b1fa2; }
        nav { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%) !important; }
        .footer { text-align: center; color: #999; padding: 20px; font-size: 0.85rem; }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">📊 A股分析平台</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">首页</a></li>
                    <li class="nav-item"><a class="nav-link" href="/portfolio">投资组合</a></li>
                    <li class="nav-item"><a class="nav-link" href="/check">预测校验</a></li>
                    <li class="nav-item"><a class="nav-link" href="/predictions">预测记录</a></li>
                    <li class="nav-item"><a class="nav-link" href="/settings">预测查询</a></li>
                    <li class="nav-item"><a class="nav-link" href="/industry">行业分析</a></li>
                    <li class="nav-item"><a class="nav-link" href="/news">新闻热点</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <div class="footer">
        <div class="container">A股分析平台 &copy; 2026</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts-wordcloud@2.1.0/dist/echarts-wordcloud.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
